<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EU Creator Campaign — Pivot Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0B1220;
    --panel:#141B2E;
    --panel-2:#1B2438;
    --border:#283655;
    --accent:#F5A623;
    --accent-2:#36D6C4;
    --text:#EAF0FB;
    --muted:#7C8AA8;
    --mono:'JetBrains Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:1240px; margin:0 auto; padding:28px 24px 80px; }

  /* ---------- Header ---------- */
  .board-header{
    display:flex; justify-content:space-between; align-items:flex-end;
    flex-wrap:wrap; gap:16px;
    border-bottom:1px solid var(--border);
    padding-bottom:18px; margin-bottom:24px;
  }
  .board-header .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:.28em;
    color:var(--accent-2); text-transform:uppercase; margin:0 0 6px;
  }
  .board-header h1{
    font-family:var(--mono); font-size:26px; letter-spacing:.06em;
    margin:0; font-weight:700;
  }
  .board-header .sub{
    color:var(--muted); font-size:13px; margin-top:6px;
  }
  .upload-btn{
    font-family:var(--mono); font-size:12px; letter-spacing:.08em;
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:10px 16px; border-radius:6px; cursor:pointer; text-transform:uppercase;
    transition:border-color .15s ease, color .15s ease;
  }
  .upload-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .upload-btn input{ display:none; }
  .upload-status{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:8px; text-align:right; }

  /* ---------- KPI flap board ---------- */
  .kpi-row{
    display:grid; grid-template-columns:repeat(7, 1fr); gap:10px; margin-bottom:24px;
  }
  @media (max-width: 980px){ .kpi-row{ grid-template-columns:repeat(2,1fr); } }
  .kpi{
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:14px 12px; text-align:left;
    perspective:600px;
  }
  .kpi .label{
    font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
    margin-bottom:8px; font-family:var(--mono);
  }
  .kpi .value{
    font-family:var(--mono); font-size:20px; font-weight:700; color:var(--accent);
    animation:flip .5s ease-out;
  }
  .kpi.alt .value{ color:var(--accent-2); }
  @keyframes flip{
    from{ transform:rotateX(80deg); opacity:0; }
    to{ transform:rotateX(0deg); opacity:1; }
  }

  /* ---------- Control panel ---------- */
  .panel{
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:18px; margin-bottom:20px;
  }
  .panel h2{
    font-family:var(--mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin:0 0 12px;
  }
  .seg{
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;
  }
  .seg button{
    font-family:var(--mono); font-size:12px; letter-spacing:.04em;
    background:var(--panel-2); border:1px solid var(--border); color:var(--muted);
    padding:8px 14px; border-radius:6px; cursor:pointer; transition:all .12s ease;
  }
  .seg button.active{
    background:var(--accent); color:#1a1305; border-color:var(--accent); font-weight:700;
  }
  .seg button:hover:not(.active){ color:var(--text); border-color:var(--accent-2); }

  .metric-grid{
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;
  }
  .chip{
    display:flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:12px;
    background:var(--panel-2); border:1px solid var(--border); color:var(--muted);
    padding:7px 12px; border-radius:20px; cursor:pointer; user-select:none;
    transition:all .12s ease;
  }
  .chip input{ accent-color:var(--accent); }
  .chip.checked{ color:var(--text); border-color:var(--accent-2); }

  .filter-row{ display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  .filter-row label{ font-size:12px; color:var(--muted); display:flex; align-items:center; gap:8px; }
  .filter-row input[type=date], .filter-row select{
    font-family:var(--mono); font-size:12px; background:var(--panel-2); border:1px solid var(--border);
    color:var(--text); padding:6px 10px; border-radius:5px;
  }
  .filter-row button{
    font-family:var(--mono); font-size:12px; background:none; border:1px solid var(--border);
    color:var(--muted); padding:6px 12px; border-radius:5px; cursor:pointer;
  }
  .filter-row button:hover{ color:var(--accent); border-color:var(--accent); }

  /* ---------- Chart + Table ---------- */
  .grid2{ display:grid; grid-template-columns:380px 1fr; gap:20px; }
  @media (max-width: 900px){ .grid2{ grid-template-columns:1fr; } }
  .chart-box{ background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:18px; }
  .chart-box h2{ font-family:var(--mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin:0 0 14px; }

  .table-box{ background:var(--panel); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  table{ width:100%; border-collapse:collapse; font-family:var(--mono); font-size:13px; }
  thead th{
    text-align:right; padding:10px 14px; background:var(--panel-2);
    color:var(--muted); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    border-bottom:1px solid var(--border); cursor:pointer; white-space:nowrap;
  }
  thead th:first-child{ text-align:left; }
  thead th:hover{ color:var(--accent); }
  thead th.sorted{ color:var(--accent); }
  tbody td{ padding:9px 14px; text-align:right; border-bottom:1px solid rgba(40,54,85,.5); white-space:nowrap; }
  tbody td:first-child{ text-align:left; font-family:var(--sans); font-weight:500; }
  tbody tr:hover{ background:rgba(54,214,196,.06); }
  tfoot td{
    padding:11px 14px; text-align:right; border-top:2px solid var(--border);
    font-weight:700; color:var(--accent); background:var(--panel-2);
  }
  tfoot td:first-child{ text-align:left; color:var(--text); font-family:var(--sans); }

  .badge{
    display:inline-block; font-size:10px; font-family:var(--mono); padding:2px 6px;
    border-radius:4px; margin-right:6px; letter-spacing:.04em;
  }

  /* ---------- QA / parsing preview ---------- */
  details{ margin-top:20px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px 18px; }
  details summary{ font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); cursor:pointer; }
  details table{ margin-top:12px; }
  details thead th{ cursor:default; }
  .empty-state{ padding:40px; text-align:center; color:var(--muted); font-family:var(--mono); font-size:13px; }
</style>
</head>

</div>

/* ===================== 2. 엔진: 필드 매핑 & 파싱 ===================== */
// 광고 이름 → 국가 / 인플루언서 / 시작일 추출 ("pivot magic"의 핵심부)
function parseAdName(adName, campaignName){
  const country = (campaignName || '').split('_')[0]?.trim() || '';
  let influencer = '';
  const atIdx = (adName || '').indexOf('@');
  if (atIdx !== -1){
    let parts = adName.slice(atIdx + 1).split('_');
    if (parts.length > 1) parts.pop(); // 마지막 토큰 = 소재 ID, 제거
    if (parts.length > 1){
      const last = parts[parts.length - 1];
      if (/^[A-Z]{2}( ?\d+)?$/.test(last)) parts.pop(); // 끝에 붙은 국가코드 제거
    }
    influencer = parts.join('_').trim();
  }
  let launchDate = '';
  const m = (adName || '').match(/^(\d{8})/);
  if (m) launchDate = `${m[1].slice(0,4)}-${m[1].slice(4,6)}-${m[1].slice(6,8)}`;
  return { country: country || '미분류', influencer: influencer || '미분류', launchDate };
}

const REQUIRED_COLS = ['보고 시작','광고 이름','캠페인 이름','광고 세트 이름','지출 금액 (KRW)','노출','클릭(전체)','링크 클릭','ThruPlay'];

function rowsFromCsv(csvText){
  const res = Papa.parse(csvText.trim(), { header:true, skipEmptyLines:true });
  const missing = REQUIRED_COLS.filter(c => !(c in (res.data[0] || {})));
  if (missing.length) throw new Error('CSV 컬럼이 일치하지 않습니다. 누락: ' + missing.join(', '));
  return res.data.map(r => {
    const extra = parseAdName(r['광고 이름'], r['캠페인 이름']);
    return {
      date: r['보고 시작'],
      adName: r['광고 이름'] || '',
      campaign: r['캠페인 이름'] || '',
      adset: r['광고 세트 이름'] || '',
      spend: parseFloat(r['지출 금액 (KRW)']) || 0,
      impressions: parseFloat(r['노출']) || 0,
      clicks: parseFloat(r['클릭(전체)']) || 0,
      linkClicks: parseFloat(r['링크 클릭']) || 0,
      thruplay: parseFloat(r['ThruPlay']) || 0,
      country: extra.country,
      influencer: extra.influencer,
      launchDate: extra.launchDate,
    };
  });
}

/* ===================== 3. 차원 / 지표 정의 ===================== */
const DIMENSIONS = {
  date:       { label:'일별',       getKey: r => r.date },
  country:    { label:'국가',       getKey: r => r.country },
  campaign:   { label:'캠페인',     getKey: r => r.campaign },
  adset:      { label:'광고세트',   getKey: r => r.adset },
  influencer: { label:'인플루언서', getKey: r => r.influencer },
  adName:     { label:'광고명',     getKey: r => r.adName },
};

const fmtInt = v => Math.round(v).toLocaleString('ko-KR');
const fmtWon = v => '₩' + Math.round(v).toLocaleString('ko-KR');
const fmtPct = v => v.toFixed(2) + '%';

const METRICS = {
  spend:       { label:'지출 (KRW)', sum:'spend',       format:fmtWon,  default:true  },
  impressions: { label:'노출',        sum:'impressions', format:fmtInt,  default:true  },
  clicks:      { label:'클릭(전체)',  sum:'clicks',      format:fmtInt,  default:false },
  linkClicks:  { label:'링크클릭',    sum:'linkClicks',  format:fmtInt,  default:true  },
  thruplay:    { label:'ThruPlay',    sum:'thruplay',    format:fmtInt,  default:false },
  ctr:         { label:'CTR',         derived: a => a.impressions ? (a.linkClicks / a.impressions * 100) : 0, format:fmtPct, default:true  },
  cpc:         { label:'CPC',         derived: a => a.linkClicks ? (a.spend / a.linkClicks) : 0,             format:fmtWon, default:true  },
  cpm:         { label:'CPM',         derived: a => a.impressions ? (a.spend / a.impressions * 1000) : 0,    format:fmtWon, default:false },
};

/* ===================== 4. 상태 ===================== */
let ALL_ROWS = [];
let state = {
  dim: 'campaign',
  metrics: Object.keys(METRICS).filter(k => METRICS[k].default),
  sortKey: 'spend',
  sortDir: 'desc',
  dateFrom: null,
  dateTo: null,
};
let chart;

/* ===================== 5. 렌더 함수 ===================== */
function aggregate(rows){
  const sums = { spend:0, impressions:0, clicks:0, linkClicks:0, thruplay:0 };
  for (const r of rows){
    sums.spend += r.spend; sums.impressions += r.impressions;
    sums.clicks += r.clicks; sums.linkClicks += r.linkClicks; sums.thruplay += r.thruplay;
  }
  return sums;
}

function getMetricValue(agg, key){
  const m = METRICS[key];
  return m.sum ? agg[m.sum] : m.derived(agg);
}

function buildPivot(rows, dimKey){
  const dim = DIMENSIONS[dimKey];
  const groups = new Map();
  for (const r of rows){
    const k = dim.getKey(r) || '미분류';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(r);
  }
  return Array.from(groups.entries()).map(([key, grpRows]) => ({
    key, agg: aggregate(grpRows), count: grpRows.length
  }));
}

function filteredRows(){
  return ALL_ROWS.filter(r => {
    if (state.dateFrom && r.date < state.dateFrom) return false;
    if (state.dateTo && r.date > state.dateTo) return false;
    return true;
  });
}

function renderKPIs(rows){
  const agg = aggregate(rows);
  const kpis = [
    { label:'총 지출', value: fmtWon(agg.spend) },
    { label:'노출수', value: fmtInt(agg.impressions) },
    { label:'링크클릭', value: fmtInt(agg.linkClicks) },
    { label:'ThruPlay', value: fmtInt(agg.thruplay) },
    { label:'CTR', value: fmtPct(getMetricValue(agg,'ctr')), alt:true },
    { label:'CPC', value: fmtWon(getMetricValue(agg,'cpc')), alt:true },
    { label:'CPM', value: fmtWon(getMetricValue(agg,'cpm')), alt:true },
  ];
  document.getElementById('kpiRow').innerHTML = kpis.map(k => `
    <div class="kpi ${k.alt?'alt':''}">
      <div class="label">${k.label}</div>
      <div class="value">${k.value}</div>
    </div>`).join('');
}

function renderControls(){
  document.getElementById('dimSeg').innerHTML = Object.entries(DIMENSIONS).map(([k,d]) =>
    `<button data-dim="${k}" class="${state.dim===k?'active':''}">${d.label}</button>`
  ).join('');
  document.getElementById('metricGrid').innerHTML = Object.entries(METRICS).map(([k,m]) =>
    `<label class="chip ${state.metrics.includes(k)?'checked':''}">
       <input type="checkbox" data-metric="${k}" ${state.metrics.includes(k)?'checked':''}> ${m.label}
     </label>`
  ).join('');
}

function renderTable(pivot){
  const cols = state.metrics;
  const dimLabel = DIMENSIONS[state.dim].label;

  // head
  document.getElementById('tableHead').innerHTML =
    `<th data-key="key" class="${state.sortKey==='key'?'sorted':''}">${dimLabel}</th>` +
    cols.map(c => `<th data-key="${c}" class="${state.sortKey===c?'sorted':''}">${METRICS[c].label} ${state.sortKey===c ? (state.sortDir==='desc'?'▼':'▲') : ''}</th>`).join('');

  // sort
  const sorted = [...pivot].sort((a,b) => {
    let av, bv;
    if (state.sortKey === 'key'){ av = a.key; bv = b.key; }
    else { av = getMetricValue(a.agg, state.sortKey); bv = getMetricValue(b.agg, state.sortKey); }
    if (av < bv) return state.sortDir === 'asc' ? -1 : 1;
    if (av > bv) return state.sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  document.getElementById('tableBody').innerHTML = sorted.map(row => `
    <tr>
      <td>${row.key}</td>
      ${cols.map(c => `<td>${METRICS[c].format(getMetricValue(row.agg, c))}</td>`).join('')}
    </tr>`).join('') || `<tr><td colspan="${cols.length+1}" class="empty-state">표시할 데이터가 없습니다</td></tr>`;

  // footer (totals)
  const totalAgg = aggregate(filteredRows());
  document.getElementById('tableFoot').innerHTML =
    `<td>전체 합계</td>` + cols.map(c => `<td>${METRICS[c].format(getMetricValue(totalAgg, c))}</td>`).join('');

  document.getElementById('rowCount').textContent = `${pivot.length}개 그룹 · 원본 ${filteredRows().length}행`;

  return sorted;
}

function renderChart(sortedPivot){
  const top = sortedPivot.slice(0, 10);
  const labels = top.map(r => String(r.key).length > 28 ? String(r.key).slice(0,26)+'…' : String(r.key));
  const chartMetric = state.sortKey === 'key' ? 'spend' : state.sortKey;
  document.getElementById('chartTitle').textContent = `TOP ${top.length} · ${DIMENSIONS[state.dim].label} 기준 (${METRICS[chartMetric].label})`;
  const data = top.map(r => getMetricValue(r.agg, chartMetric));

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('pivotChart'), {
    type:'bar',
    data:{ labels, datasets:[{ data, backgroundColor:'#F5A623', borderRadius:4, maxBarThickness:18 }] },
    options:{
      indexAxis:'y',
      responsive:true,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ color:'#7C8AA8', font:{family:'JetBrains Mono', size:10} }, grid:{ color:'#283655' } },
        y:{ ticks:{ color:'#EAF0FB', font:{family:'JetBrains Mono', size:10} }, grid:{ display:false } }
      }
    }
  });
}

function renderQA(){
  const seen = new Map();
  for (const r of ALL_ROWS){
    if (!seen.has(r.adName)) seen.set(r.adName, r);
  }
  document.getElementById('qaBody').innerHTML = Array.from(seen.values()).slice(0, 30).map(r => `
    <tr>
      <td style="text-align:left; font-family:var(--mono); font-size:11px;">${r.adName}</td>
      <td style="text-align:left;">${r.country}</td>
      <td style="text-align:left;">${r.influencer}</td>
      <td style="text-align:left; font-family:var(--mono);">${r.launchDate}</td>
    </tr>`).join('');
}

function renderAll(){
  const rows = filteredRows();
  renderKPIs(rows);
  renderControls();
  const pivot = buildPivot(rows, state.dim);
  const sorted = renderTable(pivot);
  renderChart(sorted);
}

/* ===================== 6. 이벤트 바인딩 ===================== */
function bindEvents(){
  document.getElementById('dimSeg').addEventListener('click', e => {
    const btn = e.target.closest('button[data-dim]');
    if (!btn) return;
    state.dim = btn.dataset.dim;
    state.sortKey = state.metrics[0] || 'spend';
    renderAll();
  });
  document.getElementById('metricGrid').addEventListener('change', e => {
    const cb = e.target.closest('input[data-metric]');
    if (!cb) return;
    const k = cb.dataset.metric;
    if (cb.checked){ if (!state.metrics.includes(k)) state.metrics.push(k); }
    else { state.metrics = state.metrics.filter(m => m !== k); if (state.sortKey===k) state.sortKey='key'; }
    if (state.metrics.length === 0){ cb.checked = true; state.metrics.push(k); }
    renderAll();
  });
  document.getElementById('tableHead').addEventListener('click', e => {
    const th = e.target.closest('th[data-key]');
    if (!th) return;
    const key = th.dataset.key;
    if (state.sortKey === key) state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc';
    else { state.sortKey = key; state.sortDir = 'desc'; }
    renderAll();
  });
  document.getElementById('dateFrom').addEventListener('change', e => { state.dateFrom = e.target.value || null; renderAll(); });
  document.getElementById('dateTo').addEventListener('change', e => { state.dateTo = e.target.value || null; renderAll(); });
  document.getElementById('resetFilter').addEventListener('click', () => {
    state.dateFrom = null; state.dateTo = null;
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    renderAll();
  });
  document.getElementById('csvUpload').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        ALL_ROWS = rowsFromCsv(ev.target.result);
        document.getElementById('uploadStatus').textContent = `업로드됨: ${file.name} (${ALL_ROWS.length}행)`;
        initFilters();
        renderAll();
        renderQA();
      } catch(err){
        document.getElementById('uploadStatus').textContent = '⚠ ' + err.message;
      }
    };
    reader.readAsText(file, 'UTF-8');
  });
}

function initFilters(){
  const dates = ALL_ROWS.map(r => r.date).filter(Boolean).sort();
  const min = dates[0], max = dates[dates.length-1];
  document.getElementById('dateFrom').min = min; document.getElementById('dateFrom').max = max;
  document.getElementById('dateTo').min = min; document.getElementById('dateTo').max = max;
  document.getElementById('dateRangeSub').textContent = `데이터 기간: ${min} ~ ${max} · 총 ${ALL_ROWS.length}행`;
}

/* ===================== 7. 초기화 ===================== */
ALL_ROWS = rowsFromCsv(DEFAULT_CSV);
initFilters();
bindEvents();
renderAll();
renderQA();
</script>
</body>
</html>
