/* ---- column inference (for CSV re-uploads) ---- */
function inferColumns(data){
  if(!data.length) return [];
  const names = Object.keys(data[0]);
  return names.map(name => {
    let numCount=0, dateCount=0, total=0;
    for(const r of data){
      const v = r[name];
      if(v === '' || v == null) continue;
      total++;
      if(/^\d{4}-\d{2}-\d{2}/.test(String(v))) dateCount++;
      else if(!isNaN(parseFloat(v)) && isFinite(v)) numCount++;
    }
    let type = 'dimension';
    if(total && dateCount/total > 0.8) type = 'date';
    else if(total && numCount/total > 0.8) type = 'metric';
    return { name, type };
  });
}

/* ---- field / value helpers ---- */
function allFields(){
  const metricCols = state.columns.filter(c=>c.type==='metric').map(c=>({id:c.name, label:c.name}));
  const derived = state.derivedFields.map(d=>({id:d.id, label:d.label}));
  return [...metricCols, ...derived];
}
function fieldLabel(fieldId){
  const f = allFields().find(f=>f.id===fieldId);
  return f ? f.label : fieldId;
}
function getFieldValue(rows, fieldId, agg){
  const df = state.derivedFields.find(d=>d.id===fieldId);
  if(df){
    let num=0, den=0;
    for(const r of rows){
      const nv = parseFloat(r[df.num]); if(!isNaN(nv)) num += nv;
      if(df.den){ const dv = parseFloat(r[df.den]); if(!isNaN(dv)) den += dv; }
    }
    const denom = df.den ? den : 1;
    return denom ? (num/denom)*df.mult : 0;
  }
  const vals = rows.map(r=>parseFloat(r[fieldId])).filter(v=>!isNaN(v));
  if(agg==='avg') return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  if(agg==='count') return vals.length;
  return vals.reduce((a,b)=>a+b,0);
}
function formatField(fieldId, value){
  const df = state.derivedFields.find(d=>d.id===fieldId);
  const fmt = df ? df.format : 'number';
  if(fmt==='pct') return value.toFixed(2)+'%';
  if(fmt==='currency') return '₩'+Math.round(value).toLocaleString('ko-KR');
  return Math.round(value).toLocaleString('ko-KR');
}

/* ---- filters ---- */
function applyFilters(rows, filters){
  return rows.filter(r=>{
    for(const f of (filters||[])){
      if(!f.column) continue;
      const colType = (state.columns.find(c=>c.name===f.column)||{}).type;
      if(colType==='date'){
        if(f.from && r[f.column] < f.from) return false;
        if(f.to && r[f.column] > f.to) return false;
      } else {
        if(f.values && f.values.length && !f.values.includes(r[f.column])) return false;
      }
    }
    return true;
  });
}
function uniqueValues(col){
  const set = new Set();
  for(const r of rawData) if(r[col] !== '' && r[col] != null) set.add(r[col]);
  return Array.from(set).sort();
}

/* ---- period comparison / pacing (증감률 · 달성률 · 소진률) ---- */
function getDateRange(tab){
  const dateCol = state.columns.find(c=>c.type==='date');
  if(!dateCol) return null;
  const allDates = rawData.map(r=>r[dateCol.name]).filter(Boolean).sort();
  if(!allDates.length) return null;
  const f = (tab.filters||[]).find(f=>f.column===dateCol.name);
  const from = (f && f.from) || allDates[0];
  const to = (f && f.to) || allDates[allDates.length-1];
  return { col: dateCol.name, from, to };
}
function shiftRangeBack(range){
  const oneDay = 86400000;
  const fromMs = new Date(range.from).getTime();
  const toMs = new Date(range.to).getTime();
  const days = Math.round((toMs - fromMs)/oneDay) + 1;
  const prevToMs = fromMs - oneDay;
  const prevFromMs = prevToMs - (days-1)*oneDay;
  const fmt = ms => new Date(ms).toISOString().slice(0,10);
  return { from: fmt(prevFromMs), to: fmt(prevToMs) };
}
function getComparisonRows(tab){
  const range = getDateRange(tab);
  if(!range) return null;
  const prev = shiftRangeBack(range);
  const otherFilters = (tab.filters||[]).filter(f=>f.column!==range.col);
  let rows = applyFilters(rawData, otherFilters);
  rows = rows.filter(r => r[range.col] >= prev.from && r[range.col] <= prev.to);
  return { rows, range: prev };
}
function getPaceRatio(tab){
  const range = getDateRange(tab);
  if(!range) return null;
  const oneDay = 86400000;
  const fromMs = new Date(range.from).getTime();
  const toMs = new Date(range.to).getTime() + oneDay;
  const now = Date.now();
  if(now <= fromMs) return 0;
  if(now >= toMs) return 1;
  return (now - fromMs) / (toMs - fromMs);
}
function renderKpiDelta(k, val, tab){
  if(!tab.compareEnabled) return '';
  const comp = getComparisonRows(tab);
  if(!comp) return '';
  const prevVal = getFieldValue(comp.rows, k.field, k.agg);
  if(prevVal === 0) return val === 0 ? `<span class="delta flat">- 0%</span>` : `<span class="delta new">신규</span>`;
  const pct = ((val - prevVal) / Math.abs(prevVal)) * 100;
  const up = pct >= 0;
  return `<span class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(pct).toFixed(1)}%</span>`;
}
function renderKpiProgress(k, val, tab){
  if(!k.targetType || k.targetType==='none' || !k.target) return '';
  const pct = (val/k.target)*100;
  const pctClamped = Math.max(0, Math.min(pct,100));
  const color = k.targetType==='goal'
    ? (pct>=100 ? '#1f9d55' : pct>=70 ? state.colors.accent : '#E8546B')
    : state.colors.accent;
  let html = `<div class="progress-bar"><div class="progress-fill" style="width:${pctClamped}%;background:${color}"></div></div>
    <div class="progress-label">${formatField(k.field, val)} / ${formatField(k.field, k.target)} · ${pct.toFixed(0)}%</div>`;
  if(k.targetType==='budget'){
    const pace = getPaceRatio(tab);
    if(pace!=null){
      const pacePct = pace*100;
      const diff = pct - pacePct;
      const paceColor = diff>10 ? '#E8546B' : diff<-10 ? '#4C6FFF' : '#1f9d55';
      html += `<div class="progress-bar thin"><div class="progress-fill" style="width:${Math.min(pacePct,100)}%;background:${paceColor}"></div></div>
        <div class="progress-label muted">기간 진행률 ${pacePct.toFixed(0)}%</div>`;
    }
  }
  return html;
}
function renderCompareRangeLabel(tab){
  if(!tab.compareEnabled) return '';
  const range = getDateRange(tab);
  const comp = getComparisonRows(tab);
  if(!range || !comp) return '';
  return `<span class="compare-range">현재 ${range.from}~${range.to} · 비교 ${comp.range.from}~${comp.range.to}</span>`;
}
function hexToRgb(hex){
  const v = hex.replace('#','');
  return [parseInt(v.substr(0,2),16), parseInt(v.substr(2,2),16), parseInt(v.substr(4,2),16)];
}
function rgba(hex, a){ const [r,g,b]=hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }
function rgbToHsl(r,g,b){
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){ h=s=0; } else {
    const d=max-min;
    s = l>0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h=(g-b)/d+(g<b?6:0); break;
      case g: h=(b-r)/d+2; break;
      case b: h=(r-g)/d+4; break;
    }
    h/=6;
  }
  return [h*360, s*100, l*100];
}
function hslToHex(h,s,l){
  s/=100; l/=100;
  const k = n => (n + h/30) % 12;
  const a = s * Math.min(l, 1-l);
  const f = n => l - a * Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n), 1)));
  const toHex = x => Math.round(255*x).toString(16).padStart(2,'0');
  return '#' + toHex(f(0)) + toHex(f(8)) + toHex(f(4));
}
function palette(n){
  const [r,g,b] = hexToRgb(state.colors.accent);
  const [h,s,l] = rgbToHsl(r,g,b);
  const out = [];
  for(let i=0;i<n;i++) out.push(hslToHex((h + i*48) % 360, Math.max(s,40), Math.min(Math.max(l,40),60)));
  return out;
}

/* ============================================================
   DATE PRESETS
============================================================ */
function latestDate(){
  const dateCol = state.columns.find(c=>c.type==='date');
  if(!dateCol) return null;
  const dates = rawData.map(r=>r[dateCol.name]).filter(Boolean).sort();
  return dates[dates.length-1] || null;
}
function mondayOf(d){ // ISO string date → ISO string of that week's Monday
  const dt = new Date(d + 'T00:00:00');
  const day = dt.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  dt.setDate(dt.getDate() + diff);
  return dt.toISOString().slice(0,10);
}
function monthStart(d){ return d.slice(0,7) + '-01'; }

function applyPreset(tab, preset){
  const dateCol = state.columns.find(c=>c.type==='date');
  if(!dateCol) return;
  let f = tab.filters.find(f=>f.column===dateCol.name);
  if(!f){ f = {id:newId(), column:dateCol.name, values:[], from:'', to:'' }; tab.filters.push(f); }
  const latest = latestDate();
  if(!latest) return;
  if(preset==='latest'){ f.from = latest; f.to = latest; }
  else if(preset==='week'){ f.from = mondayOf(latest); f.to = latest; }
  else if(preset==='month'){ f.from = monthStart(latest); f.to = latest; }
  else if(preset==='all'){ f.from=''; f.to=''; }
  f._preset = preset;
  renderTabContent();
}
function currentPreset(tab){
  const dateCol = state.columns.find(c=>c.type==='date');
  if(!dateCol) return 'all';
  const f = tab.filters.find(f=>f.column===dateCol.name);
  return (f && f._preset) || 'all';
}

/* ============================================================

============================================================ */
function renderMultiLevelTable(tab, rows, fields, outerDim, innerDim, metrics){
  // group by outer
  const outer = new Map();
  for(const r of rows){
    const ok = r[outerDim]||'미분류';
    if(!outer.has(ok)) outer.set(ok,[]);
    outer.get(ok).push(r);
  }
  let outerEntries = Array.from(outer.entries());
  // sort outer by first metric desc
  outerEntries.sort((a,b)=> getFieldValue(b[1], metrics[0]) - getFieldValue(a[1], metrics[0]));

  let headHtml = `<th>${outerDim}</th><th>${innerDim}</th>` + metrics.map(m=>`<th>${fieldLabel(m)}</th>`).join('');
  let bodyHtml = '';
  outerEntries.forEach(([outerKey, outerRows])=>{
    // sub-rows
    const inner = new Map();
    for(const r of outerRows){ const ik=r[innerDim]||'미분류'; if(!inner.has(ik)) inner.set(ik,[]); inner.get(ik).push(r); }
    let innerEntries = Array.from(inner.entries());
    innerEntries.sort((a,b)=> getFieldValue(b[1], metrics[0]) - getFieldValue(a[1], metrics[0]));
    innerEntries.forEach(([innerKey, innerRows])=>{
      const vals = metrics.map(m=>getFieldValue(innerRows,m));
      bodyHtml += `<tr><td></td><td>${innerKey}</td>${vals.map((v,i)=>`<td>${formatField(metrics[i],v)}</td>`).join('')}</tr>`;
    });
    // subtotal row
    const totals = metrics.map(m=>getFieldValue(outerRows,m));
    bodyHtml += `<tr class="subtotal-row"><td colspan="2">${outerKey} 합계</td>${totals.map((v,i)=>`<td>${formatField(metrics[i],v)}</td>`).join('')}</tr>`;
  });
  // grand total
  const grand = metrics.map(m=>getFieldValue(rows,m));
  let footHtml = `<td colspan="2">전체 합계</td>` + grand.map((v,i)=>`<td>${formatField(metrics[i],v)}</td>`).join('');

  document.getElementById('tblHead').innerHTML = headHtml;
  document.getElementById('tblBody').innerHTML = bodyHtml;
  document.getElementById('tblFoot').innerHTML = footHtml;
}

function renderPaceCards(tab, rows, compRows){

  const groups = new Map();
  for(const r of rows){ const k=r[paceDim]||'미분류'; if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(r); }

  const metricsToShow = tab.paceMetrics && tab.paceMetrics.length ? tab.paceMetrics : [spendField.id, 'ctr', 'cpc', 'cpm'].filter(id=>allFields().find(f=>f.id===id));

  let html = '<div class="pace-grid">';
  groups.forEach((grpRows, key)=>{
    const spend = getFieldValue(grpRows, spendField.id);
    const budget = budgetField ? getFieldValue(grpRows, budgetField) : 0;
    const pct = budget > 0 ? (spend/budget)*100 : 0;
    const diff = pct - paceTarget;
    const status = budget===0 ? 'ok' : Math.abs(diff)<=5 ? 'ok' : diff>5 ? 'over' : 'warn';
    const statusLabel = status==='ok' ? '페이스 정상' : status==='over' ? '페이스 초과' : '페이스 저조';
    const pctDisplay = budget > 0 ? pct.toFixed(0)+'%' : '-';

    // best creative by CTR
    const ctrField = allFields().find(f=>f.id==='ctr'||f.label==='CTR (%)');
    let bestCreative = '';
    if(ctrField){
      const adDim = state.columns.find(c=>c.name.includes('광고 이름')||c.name.includes('Ad Name')||c.name.includes('ad_name'));
      if(adDim){
        const adGroups = new Map();
        for(const r of grpRows){ const ak=r[adDim.name]; if(!adGroups.has(ak)) adGroups.set(ak,[]); adGroups.get(ak).push(r); }
        let best=null, bestVal=-1;
        adGroups.forEach((ar,ak)=>{ const v=getFieldValue(ar,ctrField.id); if(v>bestVal){bestVal=v;best=ak;} });
        if(best) bestCreative = `<div class="p-top">🏆 최고 효율: ${String(best).length>30?String(best).slice(0,28)+'…':best} · CTR ${bestVal.toFixed(1)}%</div>`;
      }
    }

    html += `<div class="pace-card">
      <div class="p-name">${key}</div>
      <div class="p-status ${status}">${statusLabel}</div>
      <div class="p-pct ${status}">${pctDisplay}</div>
      ${budget>0?`<div class="p-sub">▼${Math.abs(diff).toFixed(0)}pp vs 기대 ${paceTarget.toFixed(0)}%</div>`:''}
      ${budget>0?`<div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${status==='ok'?'#1f9d55':status==='over'?'#E8546B':'#E8C23A'}"></div></div>`:''}
      <div class="p-metrics">
        ${metricsToShow.map(fid=>{
          const val = getFieldValue(grpRows, fid);
          let deltaHtml = '';
          if(compRows){
            const compGrpRows = compRows.filter(r=>r[paceDim]===key);
            const prevVal = getFieldValue(compGrpRows, fid);
            if(prevVal>0){ const d=((val-prevVal)/Math.abs(prevVal)*100); deltaHtml=`<div class="p-m-delta ${d>=0?'up':'down'}">${d>=0?'▲':'▼'}${Math.abs(d).toFixed(0)}%</div>`; }
          }
          return `<div><div class="p-m-lbl">${fieldLabel(fid)}</div><div class="p-m-val">${formatField(fid,val)}</div>${deltaHtml}</div>`;
        }).join('')}
      </div>
      ${bestCreative}
    </div>`;
  });
  html += '</div>';
  return html;
}

/* ============================================================
   FATIGUE / CANDIDATE TABLE (교체·차단 후보)
============================================================ */
function renderFatigueCandidates(tab, rows){
  if(!tab.showFatigue) return '';
  const ctrField = allFields().find(f=>f.id==='ctr'||f.label==='CTR (%)');
  const adDim = state.columns.find(c=>c.name.includes('광고 이름')||c.name.includes('ad name')||c.name.includes('Ad Name'));
  const spendField = allFields().find(f=>f.id.includes('지출')||f.id.includes('비용')||f.id.includes('spend'));
  if(!ctrField || !adDim || !spendField) return '';

  const FATIGUE_CTR = tab.fatigueCtrThreshold || 2.5;
  const adGroups = new Map();
  for(const r of rows){ const k=r[adDim.name]; if(!adGroups.has(k)) adGroups.set(k,[]); adGroups.get(k).push(r); }

  const candidates = [];
  adGroups.forEach((ar,ak)=>{
    const ctr = getFieldValue(ar, ctrField.id);
    const spend = getFieldValue(ar, spendField.id);
    if(spend<1000) return; // skip tiny spend
    if(ctr < FATIGUE_CTR) candidates.push({ name:ak, ctr, spend, rows:ar });
  });
  candidates.sort((a,b)=>b.spend-a.spend);
  const top = candidates.slice(0,10);
  if(!top.length) return '';

  const total = candidates.reduce((s,c)=>s+c.spend, 0);
  const avgSaving = total / Math.max(top.length,1);

  return `<div class="fatigue-box">
    <div class="f-title">⚠ 교체·차단 후보 — CTR ${FATIGUE_CTR}% 미만</div>
    <div class="f-sub">총 ${top.length}개 · ${formatField(spendField.id,total)} · 차단 시 일평균 ${formatField(spendField.id,avgSaving/7)} 절감 여지</div>
    <table>
      <thead><tr><th style="text-align:left">소재명</th><th>CTR</th><th>이달 비용</th></tr></thead>
      <tbody>
        ${top.map(c=>`<tr>
          <td style="text-align:left;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.name}">${c.name}</td>
          <td style="color:#E8546B;font-weight:600">${c.ctr.toFixed(2)}%</td>
          <td>${formatField(spendField.id,c.spend)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderTabContent(){
  const container = document.getElementById('tabContent');
  if(!rawData.length || !state.tabs.length){
    container.innerHTML = `<div class="empty"><h2>표시할 데이터가 없습니다</h2></div>`;
    return;
  }
  const tab = currentTab();
  const fields = allFields();
  const filtered = applyFilters(rawData, tab.filters);
  let html = '';

  html += renderFiltersView(tab.filters);

  // date presets
  const dateColForPreset = state.columns.find(c=>c.type==='date');
  if(dateColForPreset){
    const pr=currentPreset(tab);
    html+=`<div class="preset-bar">
      <button class="preset-btn ${pr==='latest'?'active':''}" data-preset="latest">최근 데이터</button>
      <button class="preset-btn ${pr==='week'?'active':''}" data-preset="week">이번 주</button>
      <button class="preset-btn ${pr==='month'?'active':''}" data-preset="month">이번 달</button>
      <button class="preset-btn ${pr==='all'?'active':''}" data-preset="all">전체</button>
    </div>`;
  }

  const dateRangeInfo = getDateRange(tab);
  if(dateRangeInfo){
    html += `<div class="compare-toggle">
      <label><input type="checkbox" id="compareToggle" ${tab.compareEnabled?'checked':''}> 직전 동일 기간과 비교</label>
      ${renderCompareRangeLabel(tab)}
    </div>`;
  }

  if(tab.kpis && tab.kpis.length){
    html += `<div class="kpi-grid">` + tab.kpis.map(k=>{
      const val = getFieldValue(filtered, k.field, k.agg);
      return `<div class="kpi-card">
        <div class="lbl">${fieldLabel(k.field)}</div>
        <div class="val-row"><div class="val">${formatField(k.field, val)}</div>${renderKpiDelta(k, val, tab)}</div>
        ${renderKpiProgress(k, val, tab)}
      </div>`;
    }).join('') + `</div>`;
  }

  // pace cards
  const _compRows = tab.compareEnabled ? (getComparisonRows(tab)||{}).rows : null;
  if(tab.paceDim) html += renderPaceCards(tab, filtered, _compRows);

  // fatigue candidates
  html += renderFatigueCandidates(tab, filtered);

  // AI comments (read-only in viewer)
  if(tab.aiSummary) html += `<div class="ai-comment-box"><h3>🤖 이번 주 요약</h3><div class="ai-body">${tab.aiSummary.replace(/</g,'&lt;')}</div></div>`;
  if(tab.aiRecommend) html += `<div class="ai-comment-box"><h3>🔁 교체·차단 권고</h3><div class="ai-body">${tab.aiRecommend.replace(/</g,'&lt;')}</div></div>`;

  if(tab.charts && tab.charts.length){
    html += `<div class="chart-grid">` + tab.charts.map(c=>{
      migrateChart(c);
      return `<div class="chart-card" data-chart="${c.id}">
        <div class="row1">
          <div class="title">${c.title}</div>
          ${c.dims.length>1 ? `<select class="c-activedim activedim-select">${c.dims.map(d=>`<option value="${d}" ${d===c.activeDim?'selected':''}>${d} 기준</option>`).join('')}</select>` : ''}
        </div>
        ${renderFiltersView(c.filters)}
        <canvas></canvas>
      </div>`;
    }).join('') + `</div>`;
  }

  if(tab.table && tab.table.dims && tab.table.dims.length){
    migrateTable(tab.table);
    html += `<div class="section-title">상세 표</div>`;
    html += `<div class="table-wrap" data-tablefilters="1">
      <div class="table-ctrl">
        ${tab.table.dims.length>1 ? `<span style="font-size:12px;color:var(--muted);">중간 합계 기준</span><select id="tblActiveDim" class="activedim-select">${tab.table.dims.map(d=>`<option value="${d}" ${d===tab.table.activeDim?'selected':''}>${d}</option>`).join('')}</select>` : ''}
      </div>
      <div style="padding:0 12px;">${renderFiltersView(tab.table.filters)}</div>
      <table>
        <thead><tr id="tblHead"></tr></thead>
        <tbody id="tblBody"></tbody>
        <tfoot><tr id="tblFoot"></tr></tfoot>
      </table>
    </div>`;
  }

  container.innerHTML = html;

  if(tab.charts) tab.charts.forEach(c => renderChart(c, filtered));
  if(tab.table && tab.table.dims && tab.table.dims.length) renderTable(tab, filtered, fields);
}

/* ---- chart rendering ---- */
const chartInstances = {};
function renderChart(c, rows){
  migrateChart(c);
  const card = document.querySelector(`[data-chart="${c.id}"]`);
  if(!card) return;
  rows = applyFilters(rows, c.filters);
  const canvas = card.querySelector('canvas');
  const dimCol = c.activeDim;
  const dimType = (state.columns.find(col=>col.name===dimCol)||{}).type;

  const groups = new Map();
  for(const r of rows){
    const key = r[dimCol] || '미분류';
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  }
  let entries = Array.from(groups.entries());
  const metrics = c.metrics.length ? c.metrics : [allFields()[0]?.id];

  if(dimType==='date'){
    entries.sort((a,b)=> a[0] < b[0] ? -1 : 1);
  } else {
    entries.sort((a,b)=> getFieldValue(b[1], metrics[0]) - getFieldValue(a[1], metrics[0]));
  }
  if(c.type==='pie') entries = entries.slice(0,8);
  else entries = entries.slice(0,12);

  const labels = entries.map(([k])=> String(k).length>22 ? String(k).slice(0,20)+'…' : String(k));
  const colors = palette(Math.max(metrics.length, entries.length));

  let datasets;
  let usesSecondAxis = false;
  if(c.type==='pie'){
    const m = metrics[0];
    datasets = [{ data: entries.map(([,rws])=>getFieldValue(rws, m)), backgroundColor: colors }];
  } else if(c.type==='combo'){
    const types = metrics.map((m,i)=> c.metricTypes[m] || (i===0 ? 'bar' : 'line'));
    const mixed = types.includes('bar') && types.includes('line');
    datasets = metrics.map((m,i)=>{
      const mType = types[i];
      const onSecondAxis = mixed && mType==='line';
      usesSecondAxis = usesSecondAxis || onSecondAxis;
      return {
        type: mType,
        label: fieldLabel(m),
        data: entries.map(([,rws])=>getFieldValue(rws, m)),
        backgroundColor: mType==='line' ? rgba(colors[i%colors.length],0.18) : colors[i%colors.length],
        borderColor: colors[i%colors.length],
        borderWidth: mType==='line' ? 2 : 0,
        borderRadius: mType==='bar' ? 4 : 0,
        tension: 0.35,
        fill: false,
        yAxisID: onSecondAxis ? 'y1' : 'y',
      };
    });
  } else {
    datasets = metrics.map((m,i)=>({
      label: fieldLabel(m),
      data: entries.map(([,rws])=>getFieldValue(rws, m)),
      backgroundColor: c.type==='line' ? rgba(colors[i%colors.length],0.18) : colors[i%colors.length],
      borderColor: colors[i%colors.length],
      borderWidth: c.type==='line' ? 2 : 0,
      borderRadius: c.type==='bar' ? 4 : 0,
      tension: 0.35,
      fill: c.type==='line',
    }));
  }

  const axisStyle = { ticks:{ color: state.colors.text, font:{size:10} }, grid:{ color: rgba(state.colors.text,0.06) } };
  const scales = c.type==='pie' ? {} : {
    x: axisStyle,
    y: { ...axisStyle, grid: axisStyle.grid },
  };
  if(usesSecondAxis){
    scales.y1 = { ...axisStyle, position:'right', grid:{ drawOnChartArea:false } };
  }

  if(chartInstances[c.id]) chartInstances[c.id].destroy();
  chartInstances[c.id] = new Chart(canvas, {
    type: c.type==='pie' ? 'pie' : (c.type==='combo' ? 'bar' : c.type),
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: { legend: { display: c.type==='pie' || c.type==='combo' || metrics.length>1, labels:{ color: state.colors.text, font:{size:11} } } },
      scales,
    }
  });
}

/* ---- table rendering ---- */
function renderTable(tab, rows, fields){
  migrateTable(tab.table);
  rows = applyFilters(rows, tab.table.filters);
  const dimCol = tab.table.activeDim;
  const metrics = tab.table.metrics.length ? tab.table.metrics : [fields[0].id];
  if(tab.table.subtotalDim && tab.table.subtotalDim !== dimCol){
    renderMultiLevelTable(tab, rows, fields, dimCol, tab.table.subtotalDim, metrics);
    return;
  }
  const groups = new Map();
  for(const r of rows){
    const key = r[dimCol] || '미분류';
    if(!groups.has(key)) groups.set(key, []);
    groups.get(key).push(r);
  }
  let entries = Array.from(groups.entries()).map(([key, grpRows])=>({
    key, values: metrics.map(m=>getFieldValue(grpRows, m))
  }));

  if(!tableSort.key) tableSort = { key: metrics[0], dir:'desc' };
  entries.sort((a,b)=>{
    let av, bv;
    if(tableSort.key==='__key'){ av=a.key; bv=b.key; }
    else { const idx=metrics.indexOf(tableSort.key); av=a.values[idx]; bv=b.values[idx]; }
    if(av<bv) return tableSort.dir==='asc' ? -1 : 1;
    if(av>bv) return tableSort.dir==='asc' ? 1 : -1;
    return 0;
  });

  document.getElementById('tblHead').innerHTML =
    `<th data-sortkey="__key">${dimCol}</th>` +
    metrics.map(m=>`<th data-sortkey="${m}">${fieldLabel(m)} ${tableSort.key===m?(tableSort.dir==='desc'?'▼':'▲'):''}</th>`).join('');

  document.getElementById('tblBody').innerHTML = entries.map(e=>
    `<tr><td>${e.key}</td>${e.values.map((v,i)=>`<td>${formatField(metrics[i], v)}</td>`).join('')}</tr>`
  ).join('') || `<tr><td colspan="${metrics.length+1}" style="text-align:center;color:var(--muted);">데이터 없음</td></tr>`;

  const totals = metrics.map(m=>getFieldValue(rows, m));
  document.getElementById('tblFoot').innerHTML = `<td>합계</td>` + totals.map((v,i)=>`<td>${formatField(metrics[i], v)}</td>`).join('');
}

/* ---- render all ---- */
function renderAll(){
  applyTheme();
  renderHeader();
  renderTabbar();
  renderTabContent();
}

/* ---- resolve which filters[] array a "mini slicer" event belongs to ---- */
function getFiltersArray(e, tab){
  const chartEl = e.target.closest('[data-chart]');
  if(chartEl){
    const c = tab.charts.find(c=>c.id===chartEl.dataset.chart);
    if(c) return c.filters;
  }
  if(e.target.closest('[data-tablefilters]')) return tab.table.filters;
  return tab.filters;
}

/* ---- events ---- */
document.getElementById('tabbar').addEventListener('click', e=>{
  const t = e.target.closest('[data-tab]');
  if(!t) return;
  viewState.activeTab = t.dataset.tab;
  tableSort = { key:null, dir:'desc' };
  renderAll();
});

const tabContentEl = document.getElementById('tabContent');
tabContentEl.addEventListener('click', e=>{
  const tab = currentTab();
  const pill = e.target.closest('.pill');
  if(pill){
    const lfEl = pill.closest('[data-lf]');
    const arr = getFiltersArray(e, tab);
    const f = arr.find(f=>f.id===lfEl.dataset.lf);
    const val = pill.dataset.val;
    if(f.values.includes(val)) f.values = f.values.filter(v=>v!==val);
    else f.values.push(val);
    renderTabContent();
    return;
  }
  const th = e.target.closest('th[data-sortkey]');
  if(th){
    const key = th.dataset.sortkey;
    if(tableSort.key===key) tableSort.dir = tableSort.dir==='desc'?'asc':'desc';
    else tableSort = { key, dir:'desc' };
    const filtered = applyFilters(rawData, tab.filters);
    renderTable(tab, filtered, allFields());
    return;
  }
});
tabContentEl.addEventListener('change', e=>{
  const tab = currentTab();
  if(e.target.id==='compareToggle'){
    tab.compareEnabled = e.target.checked;
    renderTabContent();
    return;
  }
  if(e.target.classList.contains('c-activedim')){
    const chartEl = e.target.closest('[data-chart]');
    const c = tab.charts.find(c=>c.id===chartEl.dataset.chart);
    c.activeDim = e.target.value;
    renderTabContent();
    return;
  }
  if(e.target.id==='tblActiveDim'){
    tab.table.activeDim = e.target.value;
    tableSort = { key:null, dir:'desc' };
    renderTabContent();
    return;
  }
  const lfEl = e.target.closest('[data-lf]');
  if(lfEl){
    const arr = getFiltersArray(e, tab);
    const f = arr.find(f=>f.id===lfEl.dataset.lf);
    if(e.target.classList.contains('lf-values')){ f.values = Array.from(e.target.selectedOptions).map(o=>o.value); renderTabContent(); return; }
    if(e.target.classList.contains('lf-from')){ f.from = e.target.value; renderTabContent(); return; }
    if(e.target.classList.contains('lf-to')){ f.to = e.target.value; renderTabContent(); return; }
  }
});

/* ---- gear / password / CSV update ---- */
function simpleHash(str){
  if(!str) return '';
  let h1 = 0xdeadbeef ^ str.length, h2 = 0x41c6ce57 ^ str.length;
  for(let i=0;i<str.length;i++){
    const ch = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1>>>16), 2246822507) ^ Math.imul(h2 ^ (h2>>>13), 3266489909);
  h2 = Math.imul(h2 ^ (h2>>>16), 2246822507) ^ Math.imul(h1 ^ (h1>>>13), 3266489909);
  return (4294967296 * (2097151 & h2) + (h1>>>0)).toString(16);
}
function openAuth(){
  document.getElementById('pwInput').value = '';
  document.getElementById('authModal').classList.remove('hidden');
  document.getElementById('pwInput').focus();
}
function openUpload(){
  document.getElementById('uploadMsg').textContent = '';
  document.getElementById('uploadModal').classList.remove('hidden');
}
document.getElementById('gearBtn').addEventListener('click', ()=>{
  if(!PW_HASH) openUpload(); else openAuth();
});
document.getElementById('pwCancel').addEventListener('click', ()=>document.getElementById('authModal').classList.add('hidden'));
document.getElementById('pwSubmit').addEventListener('click', ()=>{
  const hash = simpleHash(document.getElementById('pwInput').value);
  if(hash === PW_HASH){
    document.getElementById('authModal').classList.add('hidden');
    openUpload();
  } else {
    alert('비밀번호가 올바르지 않습니다.');
  }
});
document.getElementById('pwInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('pwSubmit').click();
});
document.getElementById('uploadClose').addEventListener('click', ()=>document.getElementById('uploadModal').classList.add('hidden'));
document.getElementById('csvUploadView').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const res = Papa.parse(ev.target.result.trim(), { header:true, skipEmptyLines:true });
      rawData = res.data;
      state.columns = inferColumns(rawData);
      const colNames = new Set(state.columns.map(c=>c.name));
      state.derivedFields = state.derivedFields.filter(d => colNames.has(d.num) && (!d.den || colNames.has(d.den)));
      try{ localStorage.setItem('wb_published_data_v1', JSON.stringify({ rawData, columns: state.columns, derivedFields: state.derivedFields })); }catch(err){}
      document.getElementById('uploadMsg').textContent = `업데이트 완료: ${file.name} (${rawData.length}행)`;
      tableSort = { key:null, dir:'desc' };
      renderAll();
    }catch(err){
      document.getElementById('uploadMsg').textContent = '오류: ' + err.message;
    }
  };
  reader.readAsText(file, 'UTF-8');
});

/* ---- init: prefer locally-updated data if present ---- */
tabContentEl.addEventListener('click', ev=>{
  const presetBtn=ev.target.closest('[data-preset]');
  if(presetBtn && !ev.target.closest('[data-lf]')){ applyPreset(currentTab(), presetBtn.dataset.preset); return; }
});

(function init(){
  try{
    const saved = localStorage.getItem('wb_published_data_v1');
    if(saved){
      const obj = JSON.parse(saved);
      if(obj.rawData && obj.rawData.length){
        rawData = obj.rawData;
        if(obj.columns) state.columns = obj.columns;
        if(obj.derivedFields) state.derivedFields = obj.derivedFields;
      }
    }
  }catch(e){}
  // default to most recent data if no preset set
  const initTab = currentTab();
  const initDateCol = state.columns.find(c=>c.type==='date');
  if(initDateCol){
    const hasFilter = (initTab.filters||[]).find(f=>f.column===initDateCol.name);
    if(!hasFilter) applyPreset(initTab, 'latest');
  }
  renderAll();
})();
